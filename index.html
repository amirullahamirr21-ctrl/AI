<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amir Qhan | Digital Product</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #fbfffc;
      --bg2: #f1fff6;
      --text: #07130d;
      --muted: #617069;
      --card: rgba(255, 255, 255, 0.88);
      --soft: #edf9f1;
      --green: #08c96d;
      --green-dark: #05a85b;
      --line: rgba(8, 201, 109, 0.22);
      --shadow: 0 20px 70px rgba(8, 201, 109, 0.14);
      --radius: 24px;
      /* Gradasi Khusus Light Mode */
      --grad-start: rgba(255, 255, 255, 0.95);
      --grad-end: rgba(255, 255, 255, 0);
      /* Warna Neon Button Light Mode */
      --neon-bg: #ffffff;
      --neon-text: var(--green-dark);
    }

    body[data-theme="dark"] {
      --bg1: #020403;
      --bg2: #07120d;
      --text: #f4fff8;
      --muted: #a4b6ac;
      --card: rgba(10, 20, 15, 0.86);
      --soft: rgba(57, 255, 136, 0.08);
      --green: #39ff88;
      --green-dark: #00d978;
      --line: rgba(57, 255, 136, 0.24);
      --shadow: 0 20px 70px rgba(57, 255, 136, 0.15);
      /* Gradasi Khusus Dark Mode */
      --grad-start: rgba(10, 20, 15, 0.95);
      --grad-end: rgba(10, 20, 15, 0);
      /* Warna Neon Button Dark Mode */
      --neon-bg: #060e0a;
      --neon-text: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(8, 201, 109, 0.18), transparent 30%),
        radial-gradient(circle at 18% 18%, rgba(8, 201, 109, 0.10), transparent 26%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg1) 100%);
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(8, 201, 109, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(8, 201, 109, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .top-actions {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 80;
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--card);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 34px rgba(8, 201, 109, 0.10);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    #adminTopBtn {
      display: none;
    }

    .wrap {
      width: min(520px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 38px;
      position: relative;
      z-index: 2;
    }

    .loading {
      min-height: 52vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    /* ANIMASI SCROLL HALUS */
    .invisible-start {
      opacity: 0;
    }

    @keyframes scrollFadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Warna kurung siku [] global untuk semua judul */
    .section-label span,
    .product-info h2 span,
    .square-title span,
    .neon-btn span {
      color: var(--green);
    }

    .profile-card {
      text-align: center;
      margin-bottom: 24px;
      padding: 28px 22px 24px;
      border-radius: 34px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top, rgba(8, 201, 109, 0.14), transparent 42%),
        var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .photo-ring {
      width: 124px;
      height: 124px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle, rgba(8, 201, 109, 0.28), transparent 68%);
      box-shadow: 0 0 72px rgba(8, 201, 109, 0.20);
    }

    .photo-ring::before {
      content: "";
      position: absolute;
      inset: -7px;
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: inset 0 0 24px rgba(8, 201, 109, 0.14);
    }

    .photo {
      width: 106px;
      height: 106px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(8, 201, 109, 0.62);
      background: #eaf8ef;
    }

    .tagline {
      width: fit-content;
      margin: 0 auto 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.09em;
    }

    .name {
      font-family: "Bricolage Grotesque", Inter, sans-serif;
      font-size: clamp(34px, 8vw, 48px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: -0.06em;
      margin-bottom: 10px;
    }

    .name span {
      color: var(--green);
      text-shadow: 0 0 24px rgba(8, 201, 109, 0.22);
    }

    .desc {
      max-width: 390px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .socials a {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: 0 12px 34px rgba(8, 201, 109, 0.08);
      transition: 0.25s ease;
    }

    .socials a:hover {
      transform: translateY(-3px);
      color: var(--green-dark);
      box-shadow: var(--shadow);
    }

    .socials svg {
      width: 21px;
      height: 21px;
      fill: currentColor;
      display: block;
    }

    /* PENGATURAN FEED UTAMA (FLEKSIBEL) */
    .main-feed {
      display: flex;
      flex-direction: column;
      gap: 14px; 
    }

    /* NEON LINK BUTTONS */
    .neon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 62px;
      padding: 12px 20px;
      border-radius: 20px;
      background: var(--neon-bg);
      color: var(--neon-text);
      font-weight: 800;
      font-size: 14.5px;
      text-align: center;
      text-decoration: none;
      border: 1px solid rgba(8, 201, 109, 0.6);
      box-shadow: 0 0 16px rgba(8, 201, 109, 0.25), inset 0 0 8px rgba(8, 201, 109, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: neonPulse 3s infinite alternate; /* Scroll animation will be added via JS */
      position: relative;
    }

    .neon-btn:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 0 24px rgba(8, 201, 109, 0.5), inset 0 0 12px rgba(8, 201, 109, 0.3);
      border-color: rgba(8, 201, 109, 1);
      color: var(--neon-text);
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 12px rgba(8, 201, 109, 0.2), inset 0 0 5px rgba(8, 201, 109, 0.1); }
      50% { box-shadow: 0 0 22px rgba(8, 201, 109, 0.45), inset 0 0 10px rgba(8, 201, 109, 0.25); }
      100% { box-shadow: 0 0 12px rgba(8, 201, 109, 0.2), inset 0 0 5px rgba(8, 201, 109, 0.1); }
    }

    /* KATEGORI LABEL */
    .category-block {
      margin-top: 10px; 
      margin-bottom: -6px; 
    }

    .section-label {
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-align: center;
      /* text-transform dihapus agar sesuai ketikan admin */
    }

    /* PRODUK TIPE BARIS */
    .product-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 88px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 16% 50%, rgba(8, 201, 109, 0.11), transparent 36%),
        var(--card);
      box-shadow: 0 16px 50px rgba(8, 201, 109, 0.09);
      backdrop-filter: blur(18px);
    }

    .thumb {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: cover;
      background: #eefbf3;
      border: 1px solid var(--line);
    }

    .product-info {
      min-width: 0;
    }

    .product-info h2 {
      font-size: 14px;
      line-height: 1.22;
      letter-spacing: -0.035em;
      margin-bottom: 4px;
      /* text-transform dihapus agar sesuai ketikan admin */
    }

    .product-info p {
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.38;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* TOMBOL BELI */
    .buy-pill {
      min-width: 65px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      box-shadow: 0 14px 34px rgba(8, 201, 109, 0.23);
      white-space: nowrap;
    }

    .buy-pill:hover {
      transform: translateY(-2px) scale(1.04);
    }

    /* GRID SQUARES (TIPE KOTAK) */
    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .square-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 50px rgba(8, 201, 109, 0.08);
      position: relative;
    }

    .square-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      background: rgba(8, 201, 109, 0.05);
    }

    .square-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .square-overlay {
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 70%;
      background: linear-gradient(to top, var(--grad-start) 10%, var(--grad-end) 100%);
    }

    .square-content {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      margin-top: -35px;
      position: relative;
      z-index: 2;
    }

    .square-title {
      font-size: 14px; /* Disamakan dengan font-size baris (product-info h2) */
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 900;
      margin-bottom: 5px;
      text-align: left;
      /* text-transform dihapus agar sesuai ketikan admin */
    }

    .square-desc {
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.4;
      text-align: left;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* TOMBOL BELI KOTAK */
    .square-btn {
      width: 100%;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #ffffff;
      font-size: 10.5px;
      font-weight: 900;
      box-shadow: 0 10px 25px rgba(8, 201, 109, 0.25);
      transition: transform 0.2s ease;
      text-decoration: none;
      margin-top: auto;
    }

    .square-btn:hover {
      transform: translateY(-2px) scale(1.02);
    }

    /* BANNER STACK (GAMBAR NYATU TANPA CELAH) */
    .banner-stack {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--line);
      box-shadow: 0 16px 50px rgba(8, 201, 109, 0.09);
      background: radial-gradient(circle at top, rgba(8, 201, 109, 0.15), transparent 60%), var(--card);
      position: relative;
    }

    .banner-item {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
      line-height: 0;
      text-decoration: none;
      transition: transform 0.2s ease;
    }

    .banner-item:hover {
      transform: scale(1.01);
      z-index: 2;
    }

    .banner-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      margin: 0;
      border: none;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 30px 14px;
    }

    /* MODAL ADMIN */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
    }

    .modal.active {
      display: grid;
    }

    .admin-box {
      width: min(860px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--bg1);
      color: var(--text);
      box-shadow: 0 30px 90px rgba(0,0,0,0.25);
      padding: 22px;
    }

    body[data-theme="dark"] .admin-box {
      background: #07120d;
    }

    .admin-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .admin-head h2 {
      font-family: "Bricolage Grotesque", Inter, sans-serif;
      font-size: 28px;
      letter-spacing: -0.05em;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 22px;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input, textarea, select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    option {
      color: #07130d;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tab-nav {
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      font-size: 14px;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--green-dark);
      border-bottom-color: var(--green-dark);
    }

    .tab-pane {
      display: none;
    }

    .tab-pane.active {
      display: block;
    }

    .admin-card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .admin-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .primary-btn, .ghost-btn, .danger-btn {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      cursor: pointer;
      font-weight: 900;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff;
    }

    .ghost-btn {
      background: var(--card);
      color: var(--text);
    }

    .danger-btn {
      background: rgba(255, 66, 66, 0.12);
      color: #ff6262;
      border-color: rgba(255, 66, 66, 0.28);
    }

    .status {
      min-height: 22px;
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 800;
      margin-top: 10px;
    }

    /* CSS KHUSUS TAB LAYER */
    .layer-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
    }
    .layer-row:last-child {
      border-bottom: none;
    }
    .layer-row input {
      width: 70px;
      min-height: 36px;
      padding: 4px 8px;
      text-align: center;
      margin-left: 10px;
    }

    /* PENGATURAN LAYAR MOBILE KECIL */
    @media (max-width: 430px) {
      .wrap {
        width: min(100% - 20px, 520px);
        padding-top: 24px;
      }

      .profile-card {
        padding: 24px 18px 22px;
        border-radius: 30px;
      }

      .product-row {
        grid-template-columns: 56px minmax(0, 1fr) auto;
        gap: 9px;
        min-height: 80px;
        padding: 10px;
      }

      .thumb {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }

      .product-info h2 { font-size: 12.5px; } 
      .product-info p { font-size: 10.5px; } 

      .buy-pill {
        min-width: 58px;
        height: 30px;
        padding: 0 10px;
        font-size: 10px;
      }

      .grid-2 { grid-template-columns: 1fr; } 
      
      .mini-grid { 
        grid-template-columns: 1fr 1fr; 
        gap: 10px; 
      }
      
      .square-content { 
        padding: 0 10px 10px; 
        margin-top: -30px; 
      }
      .square-title { font-size: 12.5px; margin-bottom: 4px; } /* Disamakan */
      .square-desc { font-size: 9.5px; margin-bottom: 8px; }
      .square-btn { height: 30px; font-size: 10px; }
      
      .neon-btn { min-height: 54px; font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="top-actions">
    <button class="icon-btn" onclick="toggleTheme()" aria-label="Ganti tema">
      <span id="themeIcon">🌙</span>
    </button>
    <button class="icon-btn" id="adminTopBtn" onclick="openAdmin()" aria-label="Login admin">
      <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/></svg>
    </button>
  </div>

  <main class="wrap" id="app">
    <div class="loading">Loading.. </div>
  </main>

  <div class="modal" id="adminModal">
    <div class="admin-box">
      <div class="admin-head">
        <div>
          <h2>Admin Panel</h2>
          <p style="color:var(--muted); font-size:13px; margin-top:5px;">
            Kelola profil, banner, tautan, kategori, dan produk.
          </p>
        </div>
        <button class="close-btn" onclick="closeAdmin()">×</button>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>Username</label>
          <input id="adminUsername" placeholder="admin" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input id="adminPassword" type="password" placeholder="1122" required>
        </div>

        <button class="primary-btn" style="width:100%;" type="submit">Login</button>
        <div class="status" id="loginStatus"></div>
      </form>

      <div id="dashboard" style="display:none;">
        <div class="tab-nav">
          <button type="button" class="tab-btn active" onclick="switchTab('tab-profile')">Profil</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-links')">Tautan</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-banner')">Banner</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-category')">Kategori</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-product')">Produk</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-layer')">Layer</button>
        </div>

        <!-- TAB PROFIL -->
        <div id="tab-profile" class="tab-pane active">
          <div class="grid-2">
            <div class="field"><label>Nama</label><input id="editName"></div>
            <div class="field"><label>Tagline kecil</label><input id="editTagline"></div>
          </div>
          <div class="field"><label>Deskripsi</label><textarea id="editDescription"></textarea></div>
          <div class="field"><label>Foto Profil URL</label><input id="editPhoto"></div>
          <div class="grid-2">
            <div class="field"><label>Instagram</label><input id="editInstagram"></div>
            <div class="field"><label>TikTok</label><input id="editTiktok"></div>
            <div class="field"><label>Telegram</label><input id="editTelegram"></div>
            <div class="field"><label>Email</label><input id="editEmail"></div>
          </div>
          <button class="primary-btn" style="width:100%;" onclick="saveProfile()" type="button">Simpan Profil</button>
          <div class="status" id="profileStatus"></div>
        </div>

        <!-- TAB TAUTAN (NEON BUTTON) -->
        <div id="tab-links" class="tab-pane">
          <div id="adminLinks"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addLink()" type="button">+ Tambah Tautan</button>
          <div class="status" id="linkStatus"></div>
        </div>

        <!-- TAB BANNER -->
        <div id="tab-banner" class="tab-pane">
          <div id="adminBanners"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addBanner()" type="button">+ Tambah Banner</button>
          <div class="status" id="bannerStatus"></div>
        </div>

        <!-- TAB KATEGORI -->
        <div id="tab-category" class="tab-pane">
          <div id="adminCategories"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addCategory()" type="button">+ Tambah Kategori (Sebagai Judul Batas)</button>
          <div class="status" id="categoryStatus"></div>
        </div>

        <!-- TAB PRODUK -->
        <div id="tab-product" class="tab-pane">
          <div id="adminProducts"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addProduct()" type="button">+ Tambah Produk</button>
          <div class="status" id="productStatus"></div>
        </div>

        <!-- TAB LAYER (POSISI GLOBAL UNTUK SEMUA ITEM) -->
        <div id="tab-layer" class="tab-pane">
          <p style="font-size:12px; color:var(--muted); margin-bottom:15px; line-height:1.5;">
            Semua item ditampilkan di sini menjadi <b>satu kesatuan bebas</b>. Ubah angka urutan untuk mengatur posisinya sesuka hati Anda. Semakin kecil angkanya (misal: 1), semakin di atas letaknya.
          </p>

          <div id="layer-all"></div>

          <button class="primary-btn" style="width:100%; margin-top:10px;" onclick="saveAllLayers()" type="button">Simpan Perubahan Posisi</button>
          <div class="status" id="layerStatus"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // PASTE URL DEPLOYMENT GOOGLE APPS SCRIPT DI BAWAH INI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybUOw50nNi6TolfIlIEx8TtXbeqt2lmboOJOrdaKzJHh5fejifM3xINM1VP-MNugK0rQ/exec";

    const isAdminMode = window.location.search.includes("admin=1") || window.location.hash.includes("admin");
    if (isAdminMode) document.getElementById("adminTopBtn").style.display = "grid";

    let appData = { profile: {}, categories: [], products: [] };
    let modifiedLayers = {}; 

    // Set Tema
    const savedTheme = localStorage.getItem("theme") || "light";
    document.body.dataset.theme = savedTheme;
    updateThemeIcon();

    function toggleTheme() {
      const next = (document.body.dataset.theme || "light") === "light" ? "dark" : "light";
      document.body.dataset.theme = next;
      localStorage.setItem("theme", next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      document.getElementById("themeIcon").textContent = (document.body.dataset.theme || "light") === "light" ? "🌙" : "☀️";
    }

    function esc(text) {
      return String(text || "").replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
      });
    }

    // Fungsi Format Judul (Mengubah kurung siku [ ] menjadi span bewarna)
    function formatTitle(title) {
      if (!title) return "";
      return esc(title).replace(/\[(.*?)\]/g, "<span>$1</span>");
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    async function api(action, params = {}) {
      if (!GAS_URL || GAS_URL === "PASTE_URL_WEB_APP_APPS_SCRIPT_DISINI") {
        throw new Error("URL GAS belum diatur di script HTML.");
      }
      
      const activeToken = sessionStorage.getItem("admin_token");
      if (activeToken) {
        params.token = activeToken;
      }

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...params })
        });
        const result = await response.json();
        
        if (!result.ok && result.message && result.message.includes("Sesi admin tidak valid")) {
          sessionStorage.removeItem("admin_token");
        }

        if (!result.ok && result.message) throw new Error(result.message);
        return result;
      } catch (error) {
        throw new Error(error.message || "Gagal terhubung ke server.");
      }
    }

    async function loadData() {
      try {
        const response = await api("getData");
        if (response.ok) {
          appData = response.data;
          renderPage();
        }
      } catch (error) {
        document.getElementById("app").innerHTML = `<div class="loading">${esc(error.message)}</div>`;
      }
    }

    // FUNGSI ANIMASI SCROLL 
    function initScrollAnimations() {
      const elements = document.querySelectorAll('.scroll-item');
      
      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.remove('invisible-start');
            // Menjalankan animasi fadeUp buatan saat elemen terlihat
            entry.target.style.animation = 'scrollFadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards';
            obs.unobserve(entry.target);
          }
        });
      }, { 
        threshold: 0.05, 
        rootMargin: "0px 0px -30px 0px" 
      });

      elements.forEach(el => observer.observe(el));
    }

    function renderPage() {
      const p = appData.profile || {};
      let html = "";

      // 1. RENDER PROFIL KARTU ATAS
      if (p.name || p.description || p.photo || p.tagline) {
        html += `
          <section class="profile-card scroll-item invisible-start">
            ${p.photo ? `<div class="photo-ring"><img class="photo" src="${esc(p.photo)}" alt="Profil"></div>` : ""}
            ${p.tagline ? `<div class="tagline">${esc(p.tagline)}</div>` : ""}
            ${p.name ? `<h1 class="name">${esc(p.name).replace(/AI$/i, "<span>AI</span>")}</h1>` : ""}
            ${p.description ? `<p class="desc">${esc(p.description)}</p>` : ""}
            <div class="socials">
              ${p.instagram ? `<a href="${esc(p.instagram)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6Zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg></a>` : ""}
              ${p.tiktok ? `<a href="${esc(p.tiktok)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M16.6 5.82A5.66 5.66 0 0 0 20 7V10a8.7 8.7 0 0 1-3.4-.72v6.7A6.02 6.02 0 1 1 10.58 10c.36 0 .7.03 1.03.1v3.18a2.75 2.75 0 1 0 1.85 2.6V2h3.14v3.82Z"/></svg></a>` : ""}
              ${p.telegram ? `<a href="${esc(p.telegram)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M21.73 3.26a1.1 1.1 0 0 0-1.13-.18L3.2 9.8c-.78.3-.77 1.43.02 1.72l4.43 1.64 1.7 5.35c.23.74 1.17.96 1.7.4l2.45-2.56 4.54 3.34c.66.49 1.6.13 1.77-.68l2.28-14.68a1.1 1.1 0 0 0-.36-1.07ZM18.1 7.4l-7.7 6.82-.3 2.55-1.06-3.36 9.06-6.01Z"/></svg></a>` : ""}
              ${p.email ? `<a href="${p.email.includes("mailto:") ? esc(p.email) : "mailto:" + esc(p.email)}"><svg viewBox="0 0 24 24"><path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm8 8.15L4.7 7H4v.35l8 6.75 8-6.75V7h-.7L12 13.15Z"/></svg></a>` : ""}
            </div>
          </section>
        `;
      }

      // 2. MENGGABUNGKAN SEMUA ITEM (TAUTAN, KATEGORI, BANNER, PRODUK) JADI SATU LIST FLAT
      const categories = (appData.categories || []).filter(c => c.status === "active");
      const products = (appData.products || []).filter(p => p.status === "active");
      
      let allItems = [];
      categories.forEach(c => allItems.push({...c, _itemType: 'category'}));
      products.forEach(p => allItems.push({...p, _itemType: p.type}));
      
      // MENGURUTKAN SEMUA ITEM BERDASARKAN ANGKA URUTAN (GLOBAL SORTING)
      allItems.sort((a, b) => Number(a.sort || 999) - Number(b.sort || 999));

      if (allItems.length > 0) {
        html += `<div class="main-feed">`;
        
        allItems.forEach((item, i) => {
          const prevItem = allItems[i-1];
          const nextItem = allItems[i+1];

          if (item._itemType === 'category') {
            html += `<div class="category-block scroll-item invisible-start"><p class="section-label">${formatTitle(item.title)}</p></div>`;
          }
          else if (item._itemType === 'link') {
            html += `<a href="${esc(item.link)}" target="_blank" class="neon-btn scroll-item invisible-start">${formatTitle(item.title)}</a>`;
          }
          else if (item._itemType === 'banner') {
            const isFirst = !prevItem || prevItem._itemType !== 'banner';
            const isLast = !nextItem || nextItem._itemType !== 'banner';
            
            if (isFirst) html += `<div class="banner-stack scroll-item invisible-start">`;
            
            const imgHtml = `<img class="banner-img" src="${esc(item.image)}" alt="Banner">`;
            if (item.link) {
              html += `<a href="${esc(item.link)}" target="_blank" class="banner-item">${imgHtml}</a>`;
            } else {
              html += `<div class="banner-item">${imgHtml}</div>`;
            }
            
            if (isLast) html += `</div>`;
          }
          else if (item._itemType === 'row') {
            html += `<div class="product-row scroll-item invisible-start">
              <img class="thumb" src="${esc(item.image)}" alt="${esc(item.title)}">
              <div class="product-info"><h2>${formatTitle(item.title)}</h2><p>${esc(item.description)}</p></div>
              <a class="buy-pill" href="${esc(item.link)}" target="_blank">${esc(item.buttonText || "Beli")}</a>
            </div>`;
          }
          else if (item._itemType === 'square') {
            const isFirst = !prevItem || prevItem._itemType !== 'square';
            const isLast = !nextItem || nextItem._itemType !== 'square';
            
            if (isFirst) html += `<div class="mini-grid">`;
            
            html += `<div class="square-card scroll-item invisible-start">
              <div class="square-img-wrap">
                <img class="square-img" src="${esc(item.image)}" alt="${esc(item.title)}">
                <div class="square-overlay"></div>
              </div>
              <div class="square-content">
                <h3 class="square-title">${formatTitle(item.title)}</h3>
                ${item.description ? `<p class="square-desc">${esc(item.description)}</p>` : ''}
                <a class="square-btn" href="${esc(item.link)}" target="_blank">${esc(item.buttonText || "Beli Sekarang")}</a>
              </div>
            </div>`;
            
            if (isLast) html += `</div>`;
          }
        });
        
        html += `</div>`;
      } else {
        html += `<div class="empty-state">Belum ada data produk.</div>`;
      }

      document.getElementById("app").innerHTML = html;
      
      // Jalankan animasi scroll setelah semua HTML dimuat
      initScrollAnimations();
    }

    function openAdmin() {
      document.getElementById("adminModal").classList.add("active");
      if (sessionStorage.getItem("admin_token")) showDashboard();
    }
    function closeAdmin() { document.getElementById("adminModal").classList.remove("active"); }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const status = document.getElementById("loginStatus");
      status.textContent = "Verifikasi login...";
      try {
        const res = await api("login", {
          username: document.getElementById("adminUsername").value,
          password: document.getElementById("adminPassword").value
        });
        
        if (!res.ok) throw new Error(res.message || "Gagal login.");
        
        if (!res.token || res.token.trim() === "") {
          throw new Error("Terdapat error di Google Sheets: Baris 'token' tidak ditemukan/kosong. Pastikan ada baris dengan kunci 'token' (huruf kecil) di sheet Profile.");
        }

        sessionStorage.setItem("admin_token", res.token);
        status.textContent = "Berhasil login.";
        showDashboard();
      } catch (err) { status.textContent = err.message; }
    });

    async function showDashboard() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      await refreshAdminData();
    }

    async function refreshAdminData() {
      try {
        const res = await api("getData");
        if (res.ok) {
          appData = res.data;
          renderPage(); 
          fillAdminProfile();
          renderAdminLinks();
          renderAdminBanners();
          renderAdminCategories();
          renderAdminProducts();
          renderAdminLayers(); // Refresh isi tab layer
        }
      } catch (e) { console.error("Error load admin", e); }
    }

    // ================== ADMIN PROFIL ==================
    function fillAdminProfile() {
      const p = appData.profile || {};
      ['Name', 'Tagline', 'Description', 'Photo', 'Instagram', 'Tiktok', 'Telegram', 'Email'].forEach(key => {
        if(document.getElementById(`edit${key}`)) {
          document.getElementById(`edit${key}`).value = p[key.toLowerCase()] || "";
        }
      });
    }

    async function saveProfile() {
      const st = document.getElementById("profileStatus");
      st.textContent = "Menyimpan...";
      try {
        const res = await api("saveProfile", {
          name: document.getElementById("editName").value,
          tagline: document.getElementById("editTagline").value,
          description: document.getElementById("editDescription").value,
          photo: document.getElementById("editPhoto").value,
          instagram: document.getElementById("editInstagram").value,
          tiktok: document.getElementById("editTiktok").value,
          telegram: document.getElementById("editTelegram").value,
          email: document.getElementById("editEmail").value
        });
        st.textContent = res.message || "Tersimpan.";
        await refreshAdminData();
      } catch (err) { st.textContent = err.message; }
    }

    // ================== ADMIN TAUTAN (NEON BUTTON) ==================
    function renderAdminLinks() {
      const links = (appData.products || []).filter(p => p.type === 'link').sort((a,b) => Number(a.sort||0) - Number(b.sort||0));
      document.getElementById("adminLinks").innerHTML = links.map(link => `
        <div class="admin-card">
          <input type="hidden" data-link-field="id" value="${esc(link.id)}">
          <input type="hidden" data-link-field="type" value="link">
          <input type="hidden" data-link-field="categoryId" value="GLOBAL">
          <div class="field"><label>Teks Tautan (Gunakan [teks] utk warna hijau)</label><input data-link-field="title" value="${esc(link.title)}"></div>
          <div class="field"><label>Link / URL Tujuan</label><input data-link-field="link" value="${esc(link.link)}"></div>
          <div class="field"><label>Status</label>
            <select data-link-field="status">
              <option value="active" ${link.status === "active" ? "selected" : ""}>Tampil</option>
              <option value="hidden" ${link.status === "hidden" ? "selected" : ""}>Sembunyi</option>
            </select>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveItem(this, 'link', 'linkStatus')">Simpan</button>
            <button class="danger-btn" onclick="deleteItem(this, 'linkStatus')">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addLink() {
      const st = document.getElementById("linkStatus");
      st.textContent = "Menambah...";
      try {
        const totalItems = (appData.categories||[]).length + (appData.products||[]).length;
        await api("saveProduct", { id: "L" + Date.now(), categoryId: "GLOBAL", title: "Tautan Baru", description: "", image: "", link: "", buttonText: "", icon: "", type: "link", status: "active", sort: totalItems + 1 });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    // ================== ADMIN BANNER ==================
    function renderAdminBanners() {
      const banners = (appData.products || []).filter(p => p.type === 'banner').sort((a,b) => Number(a.sort||0) - Number(b.sort||0));
      document.getElementById("adminBanners").innerHTML = banners.map(ban => `
        <div class="admin-card">
          <input type="hidden" data-ban-field="id" value="${esc(ban.id)}">
          <input type="hidden" data-ban-field="type" value="banner">
          <input type="hidden" data-ban-field="categoryId" value="GLOBAL">
          <div class="field"><label>Judul Banner (Hanya u/ Admin)</label><input data-ban-field="title" value="${esc(ban.title)}"></div>
          <div class="field"><label>Gambar URL</label><input data-ban-field="image" value="${esc(ban.image)}"></div>
          <div class="field"><label>Link Tujuan Klik (Opsional)</label><input data-ban-field="link" value="${esc(ban.link)}"></div>
          <div class="field"><label>Status</label>
            <select data-ban-field="status">
              <option value="active" ${ban.status === "active" ? "selected" : ""}>Tampil</option>
              <option value="hidden" ${ban.status === "hidden" ? "selected" : ""}>Sembunyi</option>
            </select>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveItem(this, 'ban', 'bannerStatus')">Simpan</button>
            <button class="danger-btn" onclick="deleteItem(this, 'bannerStatus')">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addBanner() {
      const st = document.getElementById("bannerStatus");
      st.textContent = "Menambah...";
      try {
        const totalItems = (appData.categories||[]).length + (appData.products||[]).length;
        await api("saveProduct", { id: "B" + Date.now(), categoryId: "GLOBAL", title: "Banner Baru", description: "", image: "", link: "", buttonText: "", icon: "", type: "banner", status: "active", sort: totalItems + 1 });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    // ================== ADMIN KATEGORI ==================
    function renderAdminCategories() {
      document.getElementById("adminCategories").innerHTML = (appData.categories || []).map(cat => `
        <div class="admin-card">
          <input type="hidden" data-cat-field="id" value="${esc(cat.id)}">
          <div class="field"><label>Kategori (Gunakan [teks] utk warna hijau)</label><input data-cat-field="title" value="${esc(cat.title)}"></div>
          <div class="field"><label>Status</label>
            <select data-cat-field="status">
              <option value="active" ${cat.status === "active" ? "selected" : ""}>Tampil</option>
              <option value="hidden" ${cat.status === "hidden" ? "selected" : ""}>Sembunyi</option>
            </select>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveCategory(this)">Simpan</button>
            <button class="danger-btn" onclick="deleteCategory(this)">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addCategory() {
      const st = document.getElementById("categoryStatus");
      st.textContent = "Menambah...";
      try {
        const totalItems = (appData.categories||[]).length + (appData.products||[]).length;
        await api("saveCategory", { id: "C" + Date.now(), title: "", status: "active", sort: totalItems + 1 });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    async function saveCategory(btn) {
      const box = btn.closest(".admin-card");
      const payload = {};
      box.querySelectorAll("[data-cat-field]").forEach(i => payload[i.dataset.catField] = i.value);
      try {
        const res = await api("saveCategory", payload);
        document.getElementById("categoryStatus").textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById("categoryStatus").textContent = e.message; }
    }

    async function deleteCategory(btn) {
      if(!confirm("Hapus kategori ini?")) return;
      try {
        const id = btn.closest(".admin-card").querySelector("[data-cat-field='id']").value;
        const res = await api("deleteCategory", { id });
        document.getElementById("categoryStatus").textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById("categoryStatus").textContent = e.message; }
    }

    // ================== ADMIN PRODUK ==================
    function renderAdminProducts() {
      const cats = appData.categories || [];
      const products = (appData.products || []).filter(p => p.type !== 'link' && p.type !== 'banner');
      document.getElementById("adminProducts").innerHTML = products.map(prod => `
        <div class="admin-card">
          <input type="hidden" data-prod-field="id" value="${esc(prod.id)}">
          
          <div class="field">
            <label>Pilih Kategori (Ini sekarang bebas untuk internal Anda saja)</label>
            <select data-prod-field="categoryId">
              <option value="GLOBAL">Pilih Kategori...</option>
              ${cats.map(c => `<option value="${esc(c.id)}" ${prod.categoryId === c.id ? "selected" : ""}>${esc(c.title||c.id)}</option>`).join("")}
            </select>
          </div>
          
          <div class="field"><label>Judul (Gunakan [teks] utk warna hijau)</label><input data-prod-field="title" value="${esc(prod.title)}"></div>
          <div class="field"><label>Deskripsi (Untuk Baris/Kotak)</label><textarea data-prod-field="description">${esc(prod.description)}</textarea></div>
          <div class="field"><label>Gambar URL</label><input data-prod-field="image" value="${esc(prod.image)}"></div>
          <div class="field"><label>Link (Tujuan Klik)</label><input data-prod-field="link" value="${esc(prod.link)}"></div>
          
          <div class="field"><label>Teks Tombol Beli</label><input data-prod-field="buttonText" value="${esc(prod.buttonText || "Beli Sekarang")}"></div>
          
          <div class="grid-2">
            <div class="field"><label>Tipe Tampilan</label>
              <select data-prod-field="type">
                <option value="row" ${prod.type === "row" ? "selected" : ""}>Baris (Row)</option>
                <option value="square" ${prod.type === "square" ? "selected" : ""}>Kotak (Grid)</option>
              </select>
            </div>
            <div class="field"><label>Status</label>
              <select data-prod-field="status">
                <option value="active" ${prod.status === "active" ? "selected" : ""}>Tampil</option>
                <option value="hidden" ${prod.status === "hidden" ? "selected" : ""}>Sembunyi</option>
              </select>
            </div>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveItem(this, 'prod', 'productStatus')">Simpan</button>
            <button class="danger-btn" onclick="deleteItem(this, 'productStatus')">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addProduct() {
      const st = document.getElementById("productStatus");
      st.textContent = "Menambah...";
      try {
        const totalItems = (appData.categories||[]).length + (appData.products||[]).length;
        const defaultCategory = (appData.categories || []).length ? appData.categories[0].id : "GLOBAL";
        
        await api("saveProduct", { id: "P" + Date.now(), categoryId: defaultCategory, title: "", description: "", image: "", link: "", buttonText: "Beli", icon: "✦", type: "row", status: "active", sort: totalItems + 1 });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    // Fungsi Simpan Umum u/ Tautan, Banner & Produk
    async function saveItem(btn, dataPrefix, statusId) {
      const box = btn.closest(".admin-card");
      const payload = {};
      box.querySelectorAll(`[data-${dataPrefix}-field]`).forEach(i => payload[i.dataset[`${dataPrefix}Field`]] = i.value);
      try {
        const res = await api("saveProduct", payload);
        document.getElementById(statusId).textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById(statusId).textContent = e.message; }
    }

    // Fungsi Hapus Gabungan u/ Tautan, Banner & Produk
    async function deleteItem(btn, statusId) {
      if(!confirm("Hapus item ini?")) return;
      try {
        const inputId = btn.closest(".admin-card").querySelector("input[type='hidden']").value;
        const res = await api("deleteProduct", { id: inputId });
        document.getElementById(statusId).textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById(statusId).textContent = e.message; }
    }

    // ================== ADMIN LAYER (PENGATUR POSISI GLOBAL) ==================
    function renderAdminLayers() {
      modifiedLayers = {}; // Reset setiap kali render ulang

      // 1. Gabungkan semua item yang ada untuk diatur
      let allItems = [];
      (appData.categories || []).forEach(c => allItems.push({...c, _itemType: 'category'}));
      (appData.products || []).forEach(p => allItems.push({...p, _itemType: p.type}));
      
      // Urutkan berdasarkan angka sort
      allItems.sort((a, b) => Number(a.sort || 999) - Number(b.sort || 999));
      
      let html = `<div class="admin-card"><h3 style="margin-bottom:12px; font-size:14px; text-align:center;">Daftar Semua Item Web</h3>`;
      
      allItems.forEach(item => {
        let label = "";
        let color = "";
        if(item._itemType === 'category') { label = "Label Kategori"; color = "#00d978"; }
        else if(item._itemType === 'link') { label = "Tautan (Neon)"; color = "#00b4d8"; }
        else if(item._itemType === 'banner') { label = "Banner Gambar"; color = "#ff9800"; }
        else { label = "Produk Card"; color = "#9c27b0"; }
        
        let displayTitle = item.title || "Tanpa Judul";
        
        html += `
          <div class="layer-row">
            <div style="display:flex; flex-direction:column; gap:4px; flex-grow:1; padding-right:10px;">
               <span style="font-size:10px; font-weight:800; color:${color}; text-transform:uppercase;">${label}</span>
               <span style="font-size:13px; font-weight:600;">${esc(displayTitle)}</span>
            </div>
            <input type="number" value="${esc(item.sort)}" onchange="markLayerChanged('${item.id}', this.value)">
          </div>
        `;
      });
      html += `</div>`;
      
      document.getElementById("layer-all").innerHTML = html || "<div style='font-size:13px; color:var(--muted);'>Belum ada data</div>";
    }

    function markLayerChanged(id, newSort) {
      modifiedLayers[id] = newSort; // Tandai bahwa item ini diubah urutannya
    }

    async function saveAllLayers() {
      const keys = Object.keys(modifiedLayers);
      if(keys.length === 0) return alert("Belum ada angka posisi yang Anda ubah.");
      
      const st = document.getElementById("layerStatus");
      st.textContent = `Menyimpan 0 dari ${keys.length} perubahan posisi...`;
      
      let successCount = 0;

      for(let i=0; i<keys.length; i++) {
        const id = keys[i];
        const newSort = modifiedLayers[id];
        
        // Cari item di appData untuk mengambil sisa datanya (judul, link, dll)
        let item = appData.categories.find(c => c.id === id);
        let actionTarget = "saveCategory";
        
        if(!item) {
          item = appData.products.find(p => p.id === id);
          actionTarget = "saveProduct";
        }

        if(item) {
          // Hanya update angka sort-nya, sisanya biarkan seperti semula
          const payload = { ...item, sort: newSort };
          try {
            await api(actionTarget, payload);
            successCount++;
            st.textContent = `Menyimpan ${successCount} dari ${keys.length} perubahan posisi...`;
          } catch(e) {
            console.error("Gagal simpan urutan untuk", id, e);
          }
        }
      }
      
      st.textContent = `Selesai! Berhasil menyimpan ${successCount} perubahan.`;
      modifiedLayers = {}; // Bersihkan riwayat perubahan
      await refreshAdminData(); // Refresh UI dan data
    }

    loadData();
  </script>
</body>
</html>
