<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amir Qhan | Digital Product</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #fbfffc;
      --bg2: #f1fff6;
      --text: #07130d;
      --muted: #617069;
      --card: rgba(255, 255, 255, 0.88);
      --soft: #edf9f1;
      --green: #08c96d;
      --green-dark: #05a85b;
      --line: rgba(8, 201, 109, 0.22);
      --shadow: 0 20px 70px rgba(8, 201, 109, 0.14);
      --radius: 24px;
      /* Gradasi Khusus Light Mode */
      --grad-start: rgba(255, 255, 255, 0.95);
      --grad-end: rgba(255, 255, 255, 0);
    }

    body[data-theme="dark"] {
      --bg1: #020403;
      --bg2: #07120d;
      --text: #f4fff8;
      --muted: #a4b6ac;
      --card: rgba(10, 20, 15, 0.86);
      --soft: rgba(57, 255, 136, 0.08);
      --green: #39ff88;
      --green-dark: #00d978;
      --line: rgba(57, 255, 136, 0.24);
      --shadow: 0 20px 70px rgba(57, 255, 136, 0.15);
      /* Gradasi Khusus Dark Mode */
      --grad-start: rgba(10, 20, 15, 0.95);
      --grad-end: rgba(10, 20, 15, 0);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(8, 201, 109, 0.18), transparent 30%),
        radial-gradient(circle at 18% 18%, rgba(8, 201, 109, 0.10), transparent 26%),
        linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 52%, var(--bg1) 100%);
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(8, 201, 109, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(8, 201, 109, 0.05) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button, input, textarea, select {
      font: inherit;
    }

    .top-actions {
      position: fixed;
      top: 14px;
      right: 14px;
      z-index: 80;
      display: flex;
      gap: 8px;
    }

    .icon-btn {
      width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--card);
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(14px);
      box-shadow: 0 12px 34px rgba(8, 201, 109, 0.10);
    }

    .icon-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    #adminTopBtn {
      display: none;
    }

    .wrap {
      width: min(520px, calc(100% - 28px));
      margin: 0 auto;
      padding: 34px 0 38px;
      position: relative;
      z-index: 2;
    }

    .loading {
      min-height: 52vh;
      display: grid;
      place-items: center;
      color: var(--muted);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .profile-card {
      text-align: center;
      margin-bottom: 24px;
      padding: 28px 22px 24px;
      border-radius: 34px;
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at top, rgba(8, 201, 109, 0.14), transparent 42%),
        var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      animation: fadeUp 0.55s ease both;
    }

    .photo-ring {
      width: 124px;
      height: 124px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle, rgba(8, 201, 109, 0.28), transparent 68%);
      box-shadow: 0 0 72px rgba(8, 201, 109, 0.20);
    }

    .photo-ring::before {
      content: "";
      position: absolute;
      inset: -7px;
      border: 1px solid var(--line);
      border-radius: 50%;
      box-shadow: inset 0 0 24px rgba(8, 201, 109, 0.14);
    }

    .photo {
      width: 106px;
      height: 106px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid rgba(8, 201, 109, 0.62);
      background: #eaf8ef;
    }

    .tagline {
      width: fit-content;
      margin: 0 auto 12px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--green-dark);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 0.09em;
    }

    .name {
      font-family: "Bricolage Grotesque", Inter, sans-serif;
      font-size: clamp(34px, 8vw, 48px);
      font-weight: 800;
      line-height: 0.98;
      letter-spacing: -0.06em;
      margin-bottom: 10px;
    }

    .name span {
      color: var(--green);
      text-shadow: 0 0 24px rgba(8, 201, 109, 0.22);
    }

    .desc {
      max-width: 390px;
      margin: 0 auto;
      color: var(--muted);
      font-size: 14.5px;
      line-height: 1.65;
    }

    .socials {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    .socials a {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--text);
      box-shadow: 0 12px 34px rgba(8, 201, 109, 0.08);
      transition: 0.25s ease;
    }

    .socials a:hover {
      transform: translateY(-3px);
      color: var(--green-dark);
      box-shadow: var(--shadow);
    }

    .socials svg {
      width: 21px;
      height: 21px;
      fill: currentColor;
      display: block;
    }

    /* NEON LINK BUTTONS */
    .link-section {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }

    .neon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 62px;
      padding: 12px 20px;
      border-radius: 20px;
      background: #060e0a; /* Warna gelap tegas */
      color: #ffffff;
      font-weight: 800;
      font-size: 14.5px;
      text-align: center;
      text-decoration: none;
      border: 1px solid rgba(8, 201, 109, 0.6);
      /* Efek cahaya neon */
      box-shadow: 0 0 16px rgba(8, 201, 109, 0.25), inset 0 0 8px rgba(8, 201, 109, 0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: fadeUp 0.6s ease both, neonPulse 3s infinite alternate;
      position: relative;
    }

    .neon-btn:hover {
      transform: translateY(-4px) scale(1.015);
      box-shadow: 0 0 24px rgba(8, 201, 109, 0.5), inset 0 0 12px rgba(8, 201, 109, 0.3);
      border-color: rgba(8, 201, 109, 1);
      color: #ffffff;
    }

    @keyframes neonPulse {
      0% { box-shadow: 0 0 12px rgba(8, 201, 109, 0.2), inset 0 0 5px rgba(8, 201, 109, 0.1); }
      50% { box-shadow: 0 0 22px rgba(8, 201, 109, 0.45), inset 0 0 10px rgba(8, 201, 109, 0.25); }
      100% { box-shadow: 0 0 12px rgba(8, 201, 109, 0.2), inset 0 0 5px rgba(8, 201, 109, 0.1); }
    }

    .category-block {
      margin-top: 24px;
    }

    .section-label {
      margin: 4px 0 14px;
      color: var(--green-dark);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.14em;
      text-align: center;
      text-transform: uppercase;
    }

    .product-list {
      display: grid;
      gap: 13px;
    }

    .product-row {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 88px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background:
        radial-gradient(circle at 16% 50%, rgba(8, 201, 109, 0.11), transparent 36%),
        var(--card);
      box-shadow: 0 16px 50px rgba(8, 201, 109, 0.09);
      backdrop-filter: blur(18px);
      animation: fadeUp 0.55s ease both;
    }

    .thumb {
      width: 64px;
      height: 64px;
      border-radius: 18px;
      object-fit: cover;
      background: #eefbf3;
      border: 1px solid var(--line);
    }

    .product-info {
      min-width: 0;
    }

    .product-info h2 {
      font-size: 14px;
      line-height: 1.22;
      letter-spacing: -0.035em;
      margin-bottom: 4px;
      text-transform: uppercase;
    }

    .product-info p {
      color: var(--muted);
      font-size: 11.5px;
      line-height: 1.38;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* TOMBOL BELI */
    .buy-pill {
      min-width: 65px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 13px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #ffffff;
      font-size: 11px;
      font-weight: 900;
      text-transform: none; /* Mengikuti huruf ketikan admin */
      box-shadow: 0 14px 34px rgba(8, 201, 109, 0.23);
      white-space: nowrap;
      animation: wiggle 4s ease-in-out infinite;
    }

    .buy-pill:hover {
      transform: translateY(-2px) scale(1.04);
    }

    /* GRID SQUARES */
    .mini-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 13px;
    }

    .square-card {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--card);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 16px 50px rgba(8, 201, 109, 0.08);
      animation: fadeUp 0.55s ease both;
      position: relative;
    }

    .square-img-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      position: relative;
      background: rgba(8, 201, 109, 0.05);
    }

    .square-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .square-overlay {
      position: absolute;
      bottom: -1px;
      left: 0;
      right: 0;
      height: 70%;
      background: linear-gradient(to top, var(--grad-start) 10%, var(--grad-end) 100%);
    }

    .square-content {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      margin-top: -35px;
      position: relative;
      z-index: 2;
    }

    .square-title {
      font-size: 12.5px;
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 5px;
      text-align: left;
    }

    .square-title span {
      color: #00b4d8;
    }

    .square-desc {
      color: var(--muted);
      font-size: 10.5px;
      line-height: 1.4;
      text-align: left;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* TOMBOL BELI KOTAK */
    .square-btn {
      width: 100%;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--green), var(--green-dark)); /* Warna selaras hijau neon */
      color: #ffffff;
      font-size: 10.5px;
      font-weight: 900;
      text-transform: none; /* Mengikuti huruf ketikan admin */
      box-shadow: 0 10px 25px rgba(8, 201, 109, 0.25);
      transition: transform 0.2s ease;
      text-decoration: none;
      margin-top: auto;
    }

    .square-btn:hover {
      transform: translateY(-2px) scale(1.02);
    }

    /* BANNER STACK (GAMBAR NYATU TANPA CELAH) */
    .banner-stack {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      box-shadow: 0 16px 50px rgba(8, 201, 109, 0.09);
      background: radial-gradient(circle at top, rgba(8, 201, 109, 0.15), transparent 60%), var(--card);
      position: relative;
    }

    .banner-item {
      width: 100%;
      display: block;
      margin: 0;
      padding: 0;
      line-height: 0;
      text-decoration: none;
      animation: fadeUp 0.55s ease both;
      transition: transform 0.2s ease;
    }

    .banner-item:hover {
      transform: scale(1.01);
      z-index: 2;
    }

    .banner-img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
      margin: 0;
      border: none;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      padding: 30px 14px;
    }

    /* MODAL ADMIN */
    .modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
    }

    .modal.active {
      display: grid;
    }

    .admin-box {
      width: min(860px, 100%);
      max-height: 88vh;
      overflow: auto;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--bg1);
      color: var(--text);
      box-shadow: 0 30px 90px rgba(0,0,0,0.25);
      padding: 22px;
    }

    body[data-theme="dark"] .admin-box {
      background: #07120d;
    }

    .admin-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .admin-head h2 {
      font-family: "Bricolage Grotesque", Inter, sans-serif;
      font-size: 28px;
      letter-spacing: -0.05em;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 22px;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    input, textarea, select {
      width: 100%;
      min-height: 44px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      outline: none;
    }

    textarea {
      min-height: 82px;
      resize: vertical;
    }

    option {
      color: #07130d;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tab-nav {
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 20px;
      overflow-x: auto;
    }

    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      font-size: 14px;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--green-dark);
      border-bottom-color: var(--green-dark);
    }

    .tab-pane {
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    .tab-pane.active {
      display: block;
    }

    .admin-card {
      border: 1px solid var(--line);
      background: var(--card);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .admin-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .primary-btn, .ghost-btn, .danger-btn {
      min-height: 42px;
      border-radius: 999px;
      border: 1px solid var(--line);
      cursor: pointer;
      font-weight: 900;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      color: #fff;
    }

    .ghost-btn {
      background: var(--card);
      color: var(--text);
    }

    .danger-btn {
      background: rgba(255, 66, 66, 0.12);
      color: #ff6262;
      border-color: rgba(255, 66, 66, 0.28);
    }

    .status {
      min-height: 22px;
      color: var(--green-dark);
      font-size: 13px;
      font-weight: 800;
      margin-top: 10px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes wiggle {
      0%, 88%, 100% { transform: rotate(0deg) scale(1); }
      90% { transform: rotate(-3deg) scale(1.04); }
      92% { transform: rotate(3deg) scale(1.04); }
      94% { transform: rotate(-2deg) scale(1.03); }
      96% { transform: rotate(2deg) scale(1.03); }
    }

    /* PENGATURAN LAYAR MOBILE KECIL */
    @media (max-width: 430px) {
      .wrap {
        width: min(100% - 20px, 520px);
        padding-top: 24px;
      }

      .profile-card {
        padding: 24px 18px 22px;
        border-radius: 30px;
      }

      .product-row {
        grid-template-columns: 56px minmax(0, 1fr) auto;
        gap: 9px;
        min-height: 80px;
        padding: 10px;
      }

      .thumb {
        width: 56px;
        height: 56px;
        border-radius: 16px;
      }

      .product-info h2 { font-size: 12.5px; } 
      .product-info p { font-size: 10.5px; } 

      .buy-pill {
        min-width: 58px;
        height: 30px;
        padding: 0 10px;
        font-size: 10px;
      }

      .grid-2 { grid-template-columns: 1fr; } 
      
      .mini-grid { 
        grid-template-columns: 1fr 1fr; 
        gap: 10px; 
      }
      
      .square-content { 
        padding: 0 10px 10px; 
        margin-top: -30px; 
      }
      .square-title { font-size: 11.5px; margin-bottom: 4px; }
      .square-desc { font-size: 9.5px; margin-bottom: 8px; }
      .square-btn { height: 30px; font-size: 10px; }
      
      .neon-btn { min-height: 54px; font-size: 13px; }
    }
  </style>
</head>

<body>
  <div class="top-actions">
    <button class="icon-btn" onclick="toggleTheme()" aria-label="Ganti tema">
      <span id="themeIcon">🌙</span>
    </button>
    <button class="icon-btn" id="adminTopBtn" onclick="openAdmin()" aria-label="Login admin">
      <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5Zm0 2c-4.42 0-8 2.24-8 5v1h16v-1c0-2.76-3.58-5-8-5Z"/></svg>
    </button>
  </div>

  <main class="wrap" id="app">
    <div class="loading">Loading.. </div>
  </main>

  <div class="modal" id="adminModal">
    <div class="admin-box">
      <div class="admin-head">
        <div>
          <h2>Admin Panel</h2>
          <p style="color:var(--muted); font-size:13px; margin-top:5px;">
            Edit profil, tautan, kategori, dan produk dari sini.
          </p>
        </div>
        <button class="close-btn" onclick="closeAdmin()">×</button>
      </div>

      <form id="loginForm">
        <div class="field">
          <label>Username</label>
          <input id="adminUsername" placeholder="admin" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input id="adminPassword" type="password" placeholder="1122" required>
        </div>

        <button class="primary-btn" style="width:100%;" type="submit">Login</button>
        <div class="status" id="loginStatus"></div>
      </form>

      <div id="dashboard" style="display:none;">
        <div class="tab-nav">
          <button type="button" class="tab-btn active" onclick="switchTab('tab-profile')">Profil</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-links')">Tautan</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-category')">Kategori</button>
          <button type="button" class="tab-btn" onclick="switchTab('tab-product')">Produk</button>
        </div>

        <!-- TAB PROFIL -->
        <div id="tab-profile" class="tab-pane active">
          <div class="grid-2">
            <div class="field"><label>Nama</label><input id="editName"></div>
            <div class="field"><label>Tagline kecil</label><input id="editTagline"></div>
          </div>
          <div class="field"><label>Deskripsi</label><textarea id="editDescription"></textarea></div>
          <div class="field"><label>Foto Profil URL</label><input id="editPhoto"></div>
          <div class="grid-2">
            <div class="field"><label>Instagram</label><input id="editInstagram"></div>
            <div class="field"><label>TikTok</label><input id="editTiktok"></div>
            <div class="field"><label>Telegram</label><input id="editTelegram"></div>
            <div class="field"><label>Email</label><input id="editEmail"></div>
          </div>
          <button class="primary-btn" style="width:100%;" onclick="saveProfile()" type="button">Simpan Profil</button>
          <div class="status" id="profileStatus"></div>
        </div>

        <!-- TAB TAUTAN (NEON BUTTON) -->
        <div id="tab-links" class="tab-pane">
          <div id="adminLinks"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addLink()" type="button">+ Tambah Tautan</button>
          <div class="status" id="linkStatus"></div>
        </div>

        <!-- TAB KATEGORI -->
        <div id="tab-category" class="tab-pane">
          <div id="adminCategories"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addCategory()" type="button">+ Tambah Kategori</button>
          <div class="status" id="categoryStatus"></div>
        </div>

        <!-- TAB PRODUK -->
        <div id="tab-product" class="tab-pane">
          <div id="adminProducts"></div>
          <button class="ghost-btn" style="width:100%;" onclick="addProduct()" type="button">+ Tambah Produk</button>
          <div class="status" id="productStatus"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // PASTE URL DEPLOYMENT GOOGLE APPS SCRIPT DI BAWAH INI
    const GAS_URL = "https://script.google.com/macros/s/AKfycbybUOw50nNi6TolfIlIEx8TtXbeqt2lmboOJOrdaKzJHh5fejifM3xINM1VP-MNugK0rQ/exec";

    const isAdminMode = window.location.search.includes("admin=1") || window.location.hash.includes("admin");
    if (isAdminMode) document.getElementById("adminTopBtn").style.display = "grid";

    let appData = { profile: {}, categories: [], products: [] };

    // Set Tema
    const savedTheme = localStorage.getItem("theme") || "light";
    document.body.dataset.theme = savedTheme;
    updateThemeIcon();

    function toggleTheme() {
      const next = (document.body.dataset.theme || "light") === "light" ? "dark" : "light";
      document.body.dataset.theme = next;
      localStorage.setItem("theme", next);
      updateThemeIcon();
    }
    function updateThemeIcon() {
      document.getElementById("themeIcon").textContent = (document.body.dataset.theme || "light") === "light" ? "🌙" : "☀️";
    }

    function esc(text) {
      return String(text || "").replace(/[&<>"']/g, function(m) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[m];
      });
    }

    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-pane').forEach(pane => pane.classList.remove('active'));
      document.querySelector(`button[onclick="switchTab('${tabId}')"]`).classList.add('active');
      document.getElementById(tabId).classList.add('active');
    }

    async function api(action, params = {}) {
      if (!GAS_URL || GAS_URL === "PASTE_URL_WEB_APP_APPS_SCRIPT_DISINI") {
        throw new Error("URL GAS belum diatur di script HTML.");
      }
      
      const activeToken = sessionStorage.getItem("admin_token");
      if (activeToken) {
        params.token = activeToken;
      }

      try {
        const response = await fetch(GAS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action, ...params })
        });
        const result = await response.json();
        
        if (!result.ok && result.message && result.message.includes("Sesi admin tidak valid")) {
          sessionStorage.removeItem("admin_token");
        }

        if (!result.ok && result.message) throw new Error(result.message);
        return result;
      } catch (error) {
        throw new Error(error.message || "Gagal terhubung ke server.");
      }
    }

    async function loadData() {
      try {
        const response = await api("getData");
        if (response.ok) {
          appData = response.data;
          renderPage();
        }
      } catch (error) {
        document.getElementById("app").innerHTML = `<div class="loading">${esc(error.message)}</div>`;
      }
    }

    function renderPage() {
      const p = appData.profile || {};
      const products = (appData.products || []).filter(p => p.status === "active").sort((a, b) => Number(a.sort || 999) - Number(b.sort || 999));
      let html = "";

      // 1. RENDER PROFIL
      if (p.name || p.description || p.photo || p.tagline) {
        html += `
          <section class="profile-card">
            ${p.photo ? `<div class="photo-ring"><img class="photo" src="${esc(p.photo)}" alt="Profil"></div>` : ""}
            ${p.tagline ? `<div class="tagline">${esc(p.tagline)}</div>` : ""}
            ${p.name ? `<h1 class="name">${esc(p.name).replace(/AI$/i, "<span>AI</span>")}</h1>` : ""}
            ${p.description ? `<p class="desc">${esc(p.description)}</p>` : ""}
            <div class="socials">
              ${p.instagram ? `<a href="${esc(p.instagram)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm-.2 2A3.6 3.6 0 0 0 4 7.6v8.8A3.6 3.6 0 0 0 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6A3.6 3.6 0 0 0 16.4 4H7.6Zm9.65 1.5a1.25 1.25 0 1 1 0 2.5 1.25 1.25 0 0 1 0-2.5ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2a3 3 0 1 0 0 6 3 3 0 0 0 0-6Z"/></svg></a>` : ""}
              ${p.tiktok ? `<a href="${esc(p.tiktok)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M16.6 5.82A5.66 5.66 0 0 0 20 7V10a8.7 8.7 0 0 1-3.4-.72v6.7A6.02 6.02 0 1 1 10.58 10c.36 0 .7.03 1.03.1v3.18a2.75 2.75 0 1 0 1.85 2.6V2h3.14v3.82Z"/></svg></a>` : ""}
              ${p.telegram ? `<a href="${esc(p.telegram)}" target="_blank"><svg viewBox="0 0 24 24"><path d="M21.73 3.26a1.1 1.1 0 0 0-1.13-.18L3.2 9.8c-.78.3-.77 1.43.02 1.72l4.43 1.64 1.7 5.35c.23.74 1.17.96 1.7.4l2.45-2.56 4.54 3.34c.66.49 1.6.13 1.77-.68l2.28-14.68a1.1 1.1 0 0 0-.36-1.07ZM18.1 7.4l-7.7 6.82-.3 2.55-1.06-3.36 9.06-6.01Z"/></svg></a>` : ""}
              ${p.email ? `<a href="${p.email.includes("mailto:") ? esc(p.email) : "mailto:" + esc(p.email)}"><svg viewBox="0 0 24 24"><path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2Zm8 8.15L4.7 7H4v.35l8 6.75 8-6.75V7h-.7L12 13.15Z"/></svg></a>` : ""}
            </div>
          </section>
        `;
      }

      // 2. RENDER TAUTAN (NEON BUTTONS)
      const links = products.filter(p => p.type === "link");
      if (links.length > 0) {
        html += `<div class="link-section">`;
        links.forEach((link, i) => {
          html += `<a href="${esc(link.link)}" target="_blank" class="neon-btn" style="animation-delay:${i * 0.1}s">${esc(link.title)}</a>`;
        });
        html += `</div>`;
      }

      // 3. RENDER KATEGORI & PRODUK
      const categories = (appData.categories || []).filter(c => c.status === "active").sort((a, b) => Number(a.sort || 999) - Number(b.sort || 999));
      categories.forEach(category => {
        const catProducts = products.filter(p => p.categoryId === category.id && p.type !== "link");
        if (!catProducts.length) return;

        html += `<section class="category-block"><p class="section-label">${esc(category.title)}</p><div class="product-list">`;
        
        // Banner (Tipe Nyatu)
        const banners = catProducts.filter(p => p.type === "banner");
        if (banners.length) {
          html += `<div class="banner-stack">`;
          banners.forEach((product, i) => {
            const imgHtml = `<img class="banner-img" src="${esc(product.image)}" alt="${esc(product.title)}">`;
            if (product.link) {
              html += `<a href="${esc(product.link)}" target="_blank" class="banner-item" style="animation-delay:${i * 0.04}s">${imgHtml}</a>`;
            } else {
              html += `<div class="banner-item" style="animation-delay:${i * 0.04}s">${imgHtml}</div>`;
            }
          });
          html += `</div>`;
        }

        // Tipe Baris (Row)
        catProducts.filter(p => p.type === "row").forEach((product, i) => {
          html += `<div class="product-row" style="animation-delay:${i * 0.04}s">
            <img class="thumb" src="${esc(product.image)}" alt="${esc(product.title)}">
            <div class="product-info"><h2>${esc(product.title)}</h2><p>${esc(product.description)}</p></div>
            <a class="buy-pill" href="${esc(product.link)}" target="_blank">${esc(product.buttonText || "Beli")}</a>
          </div>`;
        });

        // Tipe Kotak (Square)
        const squares = catProducts.filter(p => p.type === "square");
        if (squares.length) {
          html += `<div class="mini-grid">`;
          squares.forEach((product, i) => {
            html += `<div class="square-card" style="animation-delay:${i * 0.04}s">
              <div class="square-img-wrap">
                <img class="square-img" src="${esc(product.image)}" alt="${esc(product.title)}">
                <div class="square-overlay"></div>
              </div>
              <div class="square-content">
                <h3 class="square-title">${esc(product.title).replace(/\[(.*?)\]/g, "<span>$1</span>")}</h3>
                ${product.description ? `<p class="square-desc">${esc(product.description)}</p>` : ''}
                <a class="square-btn" href="${esc(product.link)}" target="_blank">${esc(product.buttonText || "Beli Sekarang")}</a>
              </div>
            </div>`;
          });
          html += `</div>`;
        }
        
        html += `</div></section>`;
      });

      document.getElementById("app").innerHTML = html || `<div class="empty-state">Belum ada data produk.</div>`;
    }

    function openAdmin() {
      document.getElementById("adminModal").classList.add("active");
      if (sessionStorage.getItem("admin_token")) showDashboard();
    }
    function closeAdmin() { document.getElementById("adminModal").classList.remove("active"); }

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const status = document.getElementById("loginStatus");
      status.textContent = "Verifikasi login...";
      try {
        const res = await api("login", {
          username: document.getElementById("adminUsername").value,
          password: document.getElementById("adminPassword").value
        });
        
        if (!res.ok) throw new Error(res.message || "Gagal login.");
        
        if (!res.token || res.token.trim() === "") {
          throw new Error("Terdapat error di Google Sheets: Baris 'token' tidak ditemukan/kosong. Pastikan ada baris dengan kunci 'token' (huruf kecil) di sheet Profile.");
        }

        sessionStorage.setItem("admin_token", res.token);
        status.textContent = "Berhasil login.";
        showDashboard();
      } catch (err) { status.textContent = err.message; }
    });

    async function showDashboard() {
      document.getElementById("loginForm").style.display = "none";
      document.getElementById("dashboard").style.display = "block";
      await refreshAdminData();
    }

    async function refreshAdminData() {
      try {
        const res = await api("getData");
        if (res.ok) {
          appData = res.data;
          renderPage(); 
          fillAdminProfile();
          renderAdminLinks();
          renderAdminCategories();
          renderAdminProducts();
        }
      } catch (e) { console.error("Error load admin", e); }
    }

    // ================== ADMIN PROFIL ==================
    function fillAdminProfile() {
      const p = appData.profile || {};
      ['Name', 'Tagline', 'Description', 'Photo', 'Instagram', 'Tiktok', 'Telegram', 'Email'].forEach(key => {
        if(document.getElementById(`edit${key}`)) {
          document.getElementById(`edit${key}`).value = p[key.toLowerCase()] || "";
        }
      });
    }

    async function saveProfile() {
      const st = document.getElementById("profileStatus");
      st.textContent = "Menyimpan...";
      try {
        const res = await api("saveProfile", {
          name: document.getElementById("editName").value,
          tagline: document.getElementById("editTagline").value,
          description: document.getElementById("editDescription").value,
          photo: document.getElementById("editPhoto").value,
          instagram: document.getElementById("editInstagram").value,
          tiktok: document.getElementById("editTiktok").value,
          telegram: document.getElementById("editTelegram").value,
          email: document.getElementById("editEmail").value
        });
        st.textContent = res.message || "Tersimpan.";
        await refreshAdminData();
      } catch (err) { st.textContent = err.message; }
    }

    // ================== ADMIN TAUTAN (NEON BUTTON) ==================
    function renderAdminLinks() {
      const links = (appData.products || []).filter(p => p.type === 'link').sort((a,b) => Number(a.sort||0) - Number(b.sort||0));
      document.getElementById("adminLinks").innerHTML = links.map(link => `
        <div class="admin-card">
          <input type="hidden" data-link-field="id" value="${esc(link.id)}">
          <input type="hidden" data-link-field="type" value="link">
          <input type="hidden" data-link-field="categoryId" value="LINK_SECTION">
          <div class="field"><label>Teks Tautan</label><input data-link-field="title" value="${esc(link.title)}"></div>
          <div class="field"><label>Link / URL Tujuan</label><input data-link-field="link" value="${esc(link.link)}"></div>
          <div class="grid-2">
            <div class="field"><label>Urutan Layer (Posisi)</label><input data-link-field="sort" type="number" value="${esc(link.sort)}"></div>
            <div class="field"><label>Status</label>
              <select data-link-field="status">
                <option value="active" ${link.status === "active" ? "selected" : ""}>Tampil</option>
                <option value="hidden" ${link.status === "hidden" ? "selected" : ""}>Sembunyi</option>
              </select>
            </div>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveLink(this)">Simpan</button>
            <button class="danger-btn" onclick="deleteItem(this, 'linkStatus')">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addLink() {
      const st = document.getElementById("linkStatus");
      st.textContent = "Menambah...";
      try {
        const newSort = (appData.products.filter(p=>p.type==='link').length) + 1;
        await api("saveProduct", { id: "L" + Date.now(), categoryId: "LINK_SECTION", title: "Tautan Baru", description: "", image: "", link: "", buttonText: "", icon: "", type: "link", status: "active", sort: newSort });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    async function saveLink(btn) {
      const box = btn.closest(".admin-card");
      const payload = {};
      box.querySelectorAll("[data-link-field]").forEach(i => payload[i.dataset.linkField] = i.value);
      try {
        const res = await api("saveProduct", payload);
        document.getElementById("linkStatus").textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById("linkStatus").textContent = e.message; }
    }

    // ================== ADMIN KATEGORI ==================
    function renderAdminCategories() {
      document.getElementById("adminCategories").innerHTML = (appData.categories || []).map(cat => `
        <div class="admin-card">
          <input type="hidden" data-cat-field="id" value="${esc(cat.id)}">
          <div class="grid-2">
            <div class="field"><label>Kategori</label><input data-cat-field="title" value="${esc(cat.title)}"></div>
            <div class="field"><label>Urutan</label><input data-cat-field="sort" type="number" value="${esc(cat.sort)}"></div>
          </div>
          <div class="field"><label>Status</label>
            <select data-cat-field="status">
              <option value="active" ${cat.status === "active" ? "selected" : ""}>Tampil</option>
              <option value="hidden" ${cat.status === "hidden" ? "selected" : ""}>Sembunyi</option>
            </select>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveCategory(this)">Simpan</button>
            <button class="danger-btn" onclick="deleteCategory(this)">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addCategory() {
      const st = document.getElementById("categoryStatus");
      st.textContent = "Menambah...";
      try {
        await api("saveCategory", { id: "C" + Date.now(), title: "", status: "active", sort: (appData.categories||[]).length + 1 });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    async function saveCategory(btn) {
      const box = btn.closest(".admin-card");
      const payload = {};
      box.querySelectorAll("[data-cat-field]").forEach(i => payload[i.dataset.catField] = i.value);
      try {
        const res = await api("saveCategory", payload);
        document.getElementById("categoryStatus").textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById("categoryStatus").textContent = e.message; }
    }

    async function deleteCategory(btn) {
      if(!confirm("Hapus kategori ini?")) return;
      try {
        const id = btn.closest(".admin-card").querySelector("[data-cat-field='id']").value;
        const res = await api("deleteCategory", { id });
        document.getElementById("categoryStatus").textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById("categoryStatus").textContent = e.message; }
    }

    // ================== ADMIN PRODUK ==================
    function renderAdminProducts() {
      const cats = appData.categories || [];
      const products = (appData.products || []).filter(p => p.type !== 'link'); // Jangan tampilkan link di sini
      document.getElementById("adminProducts").innerHTML = products.map(prod => `
        <div class="admin-card">
          <input type="hidden" data-prod-field="id" value="${esc(prod.id)}">
          <div class="grid-2">
            <div class="field"><label>Kategori</label><select data-prod-field="categoryId">
              ${cats.map(c => `<option value="${esc(c.id)}" ${prod.categoryId === c.id ? "selected" : ""}>${esc(c.title||c.id)}</option>`).join("")}
            </select></div>
            <div class="field"><label>Urutan</label><input data-prod-field="sort" type="number" value="${esc(prod.sort)}"></div>
          </div>
          <div class="field"><label>Judul (Gunakan [teks] utk warna biru)</label><input data-prod-field="title" value="${esc(prod.title)}"></div>
          <div class="field"><label>Deskripsi (Untuk Baris/Kotak)</label><textarea data-prod-field="description">${esc(prod.description)}</textarea></div>
          <div class="field"><label>Gambar URL</label><input data-prod-field="image" value="${esc(prod.image)}"></div>
          <div class="field"><label>Link (Tujuan Klik)</label><input data-prod-field="link" value="${esc(prod.link)}"></div>
          <div class="grid-2">
            <div class="field"><label>Tombol</label><input data-prod-field="buttonText" value="${esc(prod.buttonText || "Beli")}"></div>
            <div class="field"><label>Icon (Emoji)</label><input data-prod-field="icon" value="${esc(prod.icon || "✦")}"></div>
          </div>
          <div class="grid-2">
            <div class="field"><label>Tipe Tampilan</label>
              <select data-prod-field="type">
                <option value="row" ${prod.type === "row" ? "selected" : ""}>Baris (Row)</option>
                <option value="square" ${prod.type === "square" ? "selected" : ""}>Kotak (Grid)</option>
                <option value="banner" ${prod.type === "banner" ? "selected" : ""}>Banner (Nyatu)</option>
              </select>
            </div>
            <div class="field"><label>Status</label>
              <select data-prod-field="status">
                <option value="active" ${prod.status === "active" ? "selected" : ""}>Tampil</option>
                <option value="hidden" ${prod.status === "hidden" ? "selected" : ""}>Sembunyi</option>
              </select>
            </div>
          </div>
          <div class="admin-actions">
            <button class="ghost-btn" onclick="saveProduct(this)">Simpan</button>
            <button class="danger-btn" onclick="deleteItem(this, 'productStatus')">Hapus</button>
          </div>
        </div>
      `).join("");
    }

    async function addProduct() {
      if (!(appData.categories || []).length) return alert("Buat kategori dulu!");
      const st = document.getElementById("productStatus");
      st.textContent = "Menambah...";
      try {
        await api("saveProduct", { id: "P" + Date.now(), categoryId: appData.categories[0].id, title: "", description: "", image: "", link: "", buttonText: "Beli", icon: "✦", type: "row", status: "active", sort: (appData.products||[]).length + 1 });
        st.textContent = "Berhasil.";
        await refreshAdminData();
      } catch(e) { st.textContent = e.message; }
    }

    async function saveProduct(btn) {
      const box = btn.closest(".admin-card");
      const payload = {};
      box.querySelectorAll("[data-prod-field]").forEach(i => payload[i.dataset.prodField] = i.value);
      try {
        const res = await api("saveProduct", payload);
        document.getElementById("productStatus").textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById("productStatus").textContent = e.message; }
    }

    // Fungsi Hapus Gabungan untuk Tautan & Produk
    async function deleteItem(btn, statusId) {
      if(!confirm("Hapus item ini?")) return;
      try {
        const inputId = btn.closest(".admin-card").querySelector("input[type='hidden']").value;
        const res = await api("deleteProduct", { id: inputId });
        document.getElementById(statusId).textContent = res.message;
        await refreshAdminData();
      } catch(e) { document.getElementById(statusId).textContent = e.message; }
    }

    loadData();
  </script>
</body>
</html>
